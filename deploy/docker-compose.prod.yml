services:
  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    container_name: imms-backend
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    ports:
      - "8000:8000"

  gateway:
    build:
      context: ..
      dockerfile: deploy/gateway.Dockerfile
    container_name: imms-gateway
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      AI_MODULE_URL: http://backend:8000
      GATEWAY_PORT: 8001
      GATEWAY_HOST: 0.0.0.0
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      CORS_ORIGINS: ${CORS_ORIGINS}
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_GATEWAY_URL: ${NEXT_PUBLIC_GATEWAY_URL}
        NEXT_PUBLIC_GATEWAY_WS_URL: ${NEXT_PUBLIC_GATEWAY_WS_URL}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: imms-frontend
    restart: unless-stopped
    depends_on:
      - backend
      - gateway
    ports:
      - "3000:3000"
